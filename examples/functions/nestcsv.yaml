datasources:
  - when:
      env:
        CSV: "true"
      args:
        - csv
    csv:
      patterns:
        - ./csv/*.csv

outputs:
  - tags: [all, client]
    json:
      root_dir: ./json/client
      indent: "  "
  - tags: [all, server]
    json:
      root_dir: ./json/server
      indent: "  "
  - tags: [all, client, server]
    json:
      root_dir: ./json
      indent: "  "

codegens:
  - tags: [all, server]
    go: 
      root_dir: ./go
      package_name: table
      singleton: true
      context: true
  - tags: [all, client]
    ue5:
      root_dir: ./ue5
      prefix: "Nest"
  - tags: [all, client]
    unity:
      root_dir: ./unity
      namespace: "Nestcsv.Example"
      singleton: true
      data_suffix: "Data"
      table_suffix: "DB"
      resource_folder: "MetaData"
